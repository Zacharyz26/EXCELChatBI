name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --frozen --extra stats --extra report --extra rag-store --extra mcp

      - name: Run backend tests
        run: uv run --frozen pytest -q
        env:
          MODEL_REGISTRY_PATH: config/models.example.yaml

      - name: Run deterministic knowledge quality gate
        run: >-
          uv run --frozen python scripts/kb_eval.py
          --enforce --profile baseline --json-output .data/kb-eval.json
        env:
          RAG_EMBEDDER: hashing
          RAG_RERANKER: lexical
          RAG_STORE: local
          RAG_MIN_RELEVANCE: "0.0"

      - name: Upload knowledge evaluation report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: kb-evaluation
          path: .data/kb-eval.json
          if-no-files-found: error
          retention-days: 30

      - name: Run Ruff
        run: uv run --frozen ruff check .

      - name: Validate Milvus Standalone Compose
        run: >-
          docker compose --env-file deploy/milvus/.env.example
          -f deploy/milvus/docker-compose.yml config --quiet

  frontend:
    name: Frontend build and browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm lint

      - name: Build frontend
        run: pnpm build

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore
          retention-days: 14

  containers:
    name: Build and smoke-test API/Web images
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          load: true
          tags: chatbi-api:ci
          cache-from: type=gha,scope=chatbi-api
          cache-to: type=gha,mode=max,scope=chatbi-api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: web
          load: true
          tags: chatbi-web:ci
          cache-from: type=gha,scope=chatbi-web
          cache-to: type=gha,mode=max,scope=chatbi-web

      - name: Smoke-test API image as non-root
        run: |
          docker run -d --name chatbi-api-ci -p 18000:8000 chatbi-api:ci
          trap 'docker rm -f chatbi-api-ci' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18000/health >/dev/null; then break; fi
            if [ "$attempt" = 30 ]; then docker logs chatbi-api-ci; exit 1; fi
            sleep 1
          done
          test "$(docker exec chatbi-api-ci id -u)" != "0"

      - name: Smoke-test Web image as non-root
        run: |
          docker network create chatbi-ci
          docker run -d --name chatbi-api-for-web --network chatbi-ci --network-alias api chatbi-api:ci
          docker run -d --name chatbi-web-ci --network chatbi-ci -p 18080:8080 chatbi-web:ci
          trap 'docker rm -f chatbi-web-ci chatbi-api-for-web; docker network rm chatbi-ci' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18080/healthz >/dev/null; then break; fi
            if [ "$attempt" = 20 ]; then docker logs chatbi-web-ci; exit 1; fi
            sleep 1
          done
          test "$(docker exec chatbi-web-ci id -u)" != "0"
