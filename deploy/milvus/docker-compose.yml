name: chatbi-milvus

# 基于 Milvus v2.6.20 官方 standalone Compose，增加固定版本、鉴权配置、
# 仅本机默认监听、健康依赖和持久化目录参数。
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: chatbi-milvus-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ${MILVUS_DATA_DIR:-./volumes}/etcd:/etcd
    command: >-
      etcd -advertise-client-urls=http://etcd:2379
      -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: chatbi-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MILVUS_MINIO_ACCESS_KEY:?set MILVUS_MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MILVUS_MINIO_SECRET_KEY:?set MILVUS_MINIO_SECRET_KEY}
    ports:
      - ${MILVUS_BIND_ADDRESS:-127.0.0.1}:${MILVUS_MINIO_PORT:-9000}:9000
      - ${MILVUS_BIND_ADDRESS:-127.0.0.1}:${MILVUS_MINIO_CONSOLE_PORT:-9001}:9001
    volumes:
      - ${MILVUS_DATA_DIR:-./volumes}/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    image: milvusdb/milvus:v2.6.20
    container_name: chatbi-milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MILVUS_MINIO_ACCESS_KEY:?set MILVUS_MINIO_ACCESS_KEY}
      MINIO_SECRET_ACCESS_KEY: ${MILVUS_MINIO_SECRET_KEY:?set MILVUS_MINIO_SECRET_KEY}
      MQ_TYPE: woodpecker
    volumes:
      - ${MILVUS_DATA_DIR:-./volumes}/milvus:/var/lib/milvus
      - ./user.yaml:/milvus/configs/user.yaml:ro
    ports:
      - ${MILVUS_BIND_ADDRESS:-127.0.0.1}:${MILVUS_PORT:-19530}:19530
      - ${MILVUS_BIND_ADDRESS:-127.0.0.1}:${MILVUS_WEBUI_PORT:-9091}:9091
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

networks:
  default:
    name: chatbi-milvus
