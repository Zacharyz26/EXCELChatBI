# 模型路由网关配置（model registry）
# 复制为 config/models.yaml 使用。密钥不写在此处，用 ${ENV_VAR} 引用 .env。
# 业务代码只按"场景"取模型，不出现具体模型名（红线 / CLAUDE 第4节）。

version: 1

# 模型清单：每个 provider 走 OpenAI 兼容适配层
providers:
  deepseek:
    type: openai_compatible
    api_base: ${DEEPSEEK_API_BASE}
    api_key: ${DEEPSEEK_API_KEY}
  vision:
    type: openai_compatible
    api_base: ${VISION_API_BASE}
    api_key: ${VISION_API_KEY}

models:
  deepseek-v4-flash:
    provider: deepseek
    model: deepseek-v4-flash
    # V4 默认开启 thinking；当前多轮工具适配层不回传 reasoning_content，
    # 因此显式关闭，保证 JSON/温度参数和 function-calling 往返可复现。
    request_params:
      extra_body:
        thinking:
          type: disabled
    # 估算价按每千 token 配置；采用缓存未命中价，实际账单以供应商为准。
    pricing:
      input_per_1k: 0.00014
      output_per_1k: 0.00028
      currency: USD
      effective_date: "2026-04-24"
  deepseek-v4-pro:
    provider: deepseek
    model: deepseek-v4-pro
    request_params:
      extra_body:
        thinking:
          type: disabled
    pricing:
      input_per_1k: 0.000435
      output_per_1k: 0.00087
      currency: USD
      effective_date: "2026-04-24"
  qwen-vl:
    provider: vision
    model: qwen2.5-vl

# 场景 → 模型路由（含备选，用于降级）。场景枚举见 packages/models/types.py。
routes:
  core_reasoning:        # 核心推理：意图理解、规划、解读、代码生成
    primary: deepseek-v4-pro
    fallback: [deepseek-v4-flash]
    temperature: 0.3
  complex_reasoning:     # v2.4 Planner/Verifier spike 候选；启用前先过行为评测
    primary: deepseek-v4-pro
    fallback: [deepseek-v4-flash]
    temperature: 0.0
  vision:                # 多模态识图，结果回推理模型
    primary: qwen-vl
    fallback: []
  lightweight:           # 轻量：query 改写、意图分类、指代消解
    primary: deepseek-v4-flash
    fallback: []
    temperature: 0.0
  agent:                 # 当前 v2.3 function-calling 循环；v2.4 继续要求工具能力
    primary: deepseek-v4-pro
    fallback: [deepseek-v4-flash]
    temperature: 0.3

# 统一调用策略（重试 / 超时 / 降级）
defaults:
  timeout_seconds: 60
  max_retries: 2
